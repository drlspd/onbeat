<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Doboru Radiowozów onbeat.gg</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🚨 System Doboru Radiowozów - onbeat.gg 🚨</h1>
        
        <div class="tabs-container">
            <button id="tab-heist" class="tab-btn active">💰 Pojazdy z napadów</button>
            <button id="tab-tracker" class="tab-btn">📡 Pojazdy z Trackera</button>
        </div>

        <div class="selection-area card">
            <label id="search-label" class="search-label">🚨 WYBIERZ LUB WPISZ POJAZD Z NAPADU np. Sultan RS, Italy GTO itd. </label>
            <div class="custom-select-wrapper">
                <div class="search-input-container">
                    <input type="text" id="search-input" placeholder="Wyszukaj pojazd..." autocomplete="off">
                    <div class="search-icon">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    </div>
                </div>
                <div id="custom-dropdown" class="dropdown-content hidden">
                    </div>
            </div>
        </div>

        <div id="hover-preview" class="hover-preview-box hidden">
            <img id="hover-preview-img" src="" alt="Podgląd">
        </div>

        <div class="results-area">
            <div id="suspect-car" class="result-box card hidden">
                <h3>🚗 Wykryty Pojazd:</h3>
                <div id="suspect-display"></div>
            </div>
            
            <div id="police-cars" class="result-box card hidden">
                <h3>🚓 Rekomendowane Radiowozy:</h3>
                <div id="police-display" class="grid-display"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
